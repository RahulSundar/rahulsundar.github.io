<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
            <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="site-nav" id="site-navigation">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/research/' | relative_url }}">Research</a>
                <a href="{{ '/phd/' | relative_url }}">PhD</a>
                <a href="{{ '/publications/' | relative_url }}">Publications</a>
                <a href="{{ '/software/' | relative_url }}">Software</a>
                <a href="{{ '/teaching/' | relative_url }}">Teaching</a>
                <a href="{{ '/outreach/' | relative_url }}">Outreach</a>
                <a href="{{ '/blog/' | relative_url }}">Blog</a>
                <a href="{{ '/others/' | relative_url }}">Others</a>
                <a href="{{ '/resume/' | relative_url }}">Resume</a>
            </nav>
        </div>
    </header>

    <main class="page-content" aria-label="Content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="wrapper">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author | default: site.title }}. Powered by Jekyll.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        // Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('site-navigation').classList.toggle('active');
        });
    </script>
    <script src="{{ '/assets/js/pagination.js' | relative_url }}"></script>
</body>
</html>
